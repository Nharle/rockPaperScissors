<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Rock, Paper, Scissors</title>
    <script src="script.js" defer></script>
</head>
<body>
    <h1 class="header">Rock, Paper, Scissors!</h1>
    <div class="buttons">
        <button class="button"><img id="rock" src="images/rock.jpeg" alt="Rock"></button>
        <button class="button"><img id="paper" src="images/paper.jpg" alt="Paper"></button>
        <button class="button"><img id="scissors" src="images/scissors.jpeg" alt="Scissors"></button>
    </div>
    <div id="roundResult"></div>
    <div id="scores"></div>
    <div id="reset"></div>
</body>
</html>
